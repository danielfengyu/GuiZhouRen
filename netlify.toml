[build]
  command = "npx hexo generate"
  publish = "public"

[build.environment]
  NODE_VERSION = "22"

# 自定义域名重定向
[[redirects]]
  from = "https://guizhouren.netlify.app/*"
  to = "https://www.guizhouren.netlify.app/:splat"
  status = 301

# SPA 回退
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Path = ["/map/*", "/explore/*"]}

# 安全与性能头部
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"
