# --------------------------------------
# Butterfly Theme Configuration
# Docs: https://butterfly.js.org/
# --------------------------------------

# Top Image (顶部背景图)
# 本地图片，放到 source/img/banner.jpg
index_img: /img/banner.jpg

# 默认顶部图（文章页、分类页等没有单独设置 top_img 时使用）
default_top_img: /img/banner.jpg

# 顶部图高度（推荐设为全屏高度的一半，留出内容空间）
index_top_img_height: 400px
index_site_info_top: 150px

# Navigation Menu
menu:
  首页: / || fas fa-home
  文章: /archives/ || fas fa-archive
  探索: /map/ || fas fa-map-marked-alt
  分类: /categories/ || fas fa-folder-open
  标签: /tags/ || fas fa-tags
  关于: /about/ || fas fa-heart

# Favicon
favicon: /img/favicon.png

# Avatar
avatar:
  img: /img/avatar.png
  effect: true

# Social links
social:
  github: https://github.com/ || fab fa-github
  weibo: https://weibo.com/ || fab fa-weibo

# Post meta display
post_meta:
  page:
    date_type: created
    categories: true
    tags: true
  post:
    date_type: created
    categories: true
    tags: true

# Code blocks
highlight_theme: mac

# Sidebar settings
aside:
  enable: true
  mobile: true
  position: right
  card_author:
    enable: true
    description: 贵州黔行
    button:
      enable: true
      icon: fab fa-github
      text: 关注
      link: https://github.com/
  card_announcement:
    enable: true
    content: 走遍大地神州，醉美多彩贵州
  card_categories:
    enable: true
    limit: 8
    expand: none
  card_tags:
    enable: true
    limit: 40
    color: true
  card_archives:
    enable: true
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true

# Footer
footer_bg: false

# Word count
wordcount:
  enable: true
  post_wordcount: true

# Local search
local_search:
  enable: true
  preload: true

# Copy settings
copyright:
  enable: true
  limit_count: 50

# Dark mode
darkmode:
  enable: true
  button: true
  autoChangeMode: false

# Beautify
beautify:
  enable: true
  field: post
  title-prefix-icon: '\f0c1'

# PWA (Progressive Web App)
pwa:
  enable: true
  manifest: /manifest.json
  apple_touch_icon: /img/butterfly-icon.png
  favicon_32_32: /img/butterfly-icon.png
  favicon_16_16: /img/favicon.ico
  mask_icon: /img/butterfly-icon.png

# Comments: Giscus (GitHub Discussions, 零运维、零数据库、国内可访问)
# 配置生成器：https://giscus.app/zh-CN
# 仓库：danielfengyu/giscus-comments（需在 GitHub 仓库设置中开启 Discussions）
comments:
  use:
    - Giscus
  text: true
  lazyload: false
  count: false

# Giscus Configuration
giscus:
  repo: danielfengyu/GuiZhouRen
  repo_id: R_kgDOTN2n9w
  category_id: DIC_kwDOTN2n984DAxtR
  light_theme: light
  dark_theme: dark_dimmed
  option:
    data-mapping: pathname
    data-reactions-enabled: 1
    data-emit-metadata: 0
    data-input-position: bottom
    data-lang: zh-CN

# Open graph meta tags
Open_Graph_meta:
  enable: true
  option:
    twitter_card: summary_large_image

# Structured Data
structured_data:
  enable: true
  alternate_name:
    - '贵州旅游攻略'
    - '贵州88县市'
    - 'guizhouren'

# Inject custom CSS/JS
inject:
  head:
    # 百度统计
    - '<script>var _hmt=_hmt||[];(function(){var hm=document.createElement("script");hm.src="https://hm.baidu.com/hm.js?40f819b48bb6fa2edb21b46dd3525407";var s=document.getElementsByTagName("script")[0];s.parentNode.insertBefore(hm,s)})();</script>'
    # Google Analytics GA4
    - '<script async src="https://www.googletagmanager.com/gtag/js?id=G-X758DXBFRS"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js",new Date());gtag("config","G-X758DXBFRS");</script>'
    # JSON-LD 面包屑结构化数据（增强搜索结果展示）
    - |
      <script>
      document.addEventListener('DOMContentLoaded', function() {
        var breadcrumb = [];
        var siteUrl = 'https://guizhouren.netlify.app';
        breadcrumb.push({'@type': 'ListItem', 'position': 1, 'name': '首页', 'item': siteUrl + '/'});
        var cats = document.querySelector('.post-meta__categories a') || document.querySelector('#post-category a');
        if (cats) {
          breadcrumb.push({'@type': 'ListItem', 'position': 2, 'name': cats.textContent.trim(), 'item': siteUrl + cats.getAttribute('href')});
        }
        var title = document.querySelector('h1.page-title') || document.querySelector('h1.post-title');
        if (title) {
          breadcrumb.push({'@type': 'ListItem', 'position': breadcrumb.length + 1, 'name': title.textContent.trim(), 'item': window.location.href.split('?')[0].split('#')[0]});
        }
        if (breadcrumb.length > 1) {
          var ld = document.getElementById('breadcrumb-ld');
          if (ld) {
            ld.textContent = JSON.stringify({'@context': 'https://schema.org', '@type': 'BreadcrumbList', 'itemListElement': breadcrumb});
          }
        }
      });
      </script>
    # JSON-LD 网站结构化数据
    - |
      <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "贵州黔行",
        "url": "https://guizhouren.netlify.app",
        "description": "走遍大地神州，醉美多彩贵州。贵州88县市旅游攻略、美食、景点全收录。",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://guizhouren.netlify.app/search/?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
      </script>
    # 自动为封面图片添加 alt 属性
    - |
      <script>
      document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.article-sort-item-img img, #post-cover img').forEach(function(img) {
          if (!img.alt) {
            var title = document.querySelector('h1.page-title') || document.querySelector('h1.post-title');
            img.alt = title ? title.textContent.trim() + ' 封面图' : '贵州旅游 封面图';
          }
        });
      });
      </script>
  bottom:
    # Service Worker 注册（PWA 离线访问）
    - '<script>if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("/sw.js").then(function(r){console.log("SW registered:",r.scope)}).catch(function(e){console.log("SW failed:",e)})})}</script>'
    # 页面入场动画样式
    - |
      <style>
        .article-sort-item,.recent-post-item,.relatedPosts,.post-content>h2,.post-content>h3,.post-content>p,.post-content>table,.post-content>blockquote,.post-content>ul,.post-content>ol{opacity:0;transform:translateY(20px);animation:fadeUp .5s ease forwards}
        .article-sort-item:nth-child(2){animation-delay:.05s}
        .article-sort-item:nth-child(3){animation-delay:.1s}
        .article-sort-item:nth-child(4){animation-delay:.15s}
        .article-sort-item:nth-child(5){animation-delay:.2s}
        .article-sort-item:nth-child(6){animation-delay:.25s}
        .article-sort-item:nth-child(7){animation-delay:.3s}
        .article-sort-item:nth-child(8){animation-delay:.35s}
        .recent-post-item:nth-child(2){animation-delay:.1s}
        .recent-post-item:nth-child(3){animation-delay:.2s}
        .recent-post-item:nth-child(4){animation-delay:.3s}
        @keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
        .random-post-btn{position:fixed;bottom:120px;right:20px;z-index:999;width:44px;height:44px;border-radius:50%;background:var(--btn-bg,#49b1f5);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.15);transition:all .3s;font-size:18px;border:none;opacity:.85}
        .random-post-btn:hover{opacity:1;transform:scale(1.1)}
      </style>
    # 随机文章按钮
    - |
      <script>
        document.addEventListener('DOMContentLoaded', function() {
          var btn = document.createElement('button');
          btn.className = 'random-post-btn';
          btn.title = '随便看看';
          btn.innerHTML = '<i class="fas fa-random"></i>';
          btn.addEventListener('click', function() {
            var x = new XMLHttpRequest();
            x.onload = function() {
              var d = document.createElement('div');
              d.innerHTML = x.responseText;
              var l = d.querySelectorAll('.article-title a');
              if (l.length) {
                location.href = l[Math.floor(Math.random() * l.length)].href;
              } else {
                location.href = '/archives/';
              }
            };
            x.open('GET', '/archives/');
            x.send();
          });
          document.body.appendChild(btn);
        });
      </script>

# CDN settings
cdn:
  enable: false

# Other
index_post_content:
  method: 2
  length: 200
