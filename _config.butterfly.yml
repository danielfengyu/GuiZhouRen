# --------------------------------------
# Butterfly Theme Configuration
# Docs: https://butterfly.js.org/
# --------------------------------------

# Top Image (顶部背景图)
# 首页顶部图 | 使用 Pixabay CC0 免费黄果树瀑布图
# 图片ID: 2682310 | 来源: https://pixabay.com/zh/photos/guizhou-huangguoshu-fall-guizhou-2682310/
index_img: https://cdn.pixabay.com/photo/2017/08/26/10/12/guizhou-2682310_1280.jpg

# 默认顶部图（文章页、分类页等没有单独设置 top_img 时使用）
default_top_img: https://cdn.pixabay.com/photo/2017/08/26/10/12/guizhou-2682310_1280.jpg

# 顶部图高度（推荐设为全屏高度的一半，留出内容空间）
index_top_img_height: 400px
index_site_info_top: 150px

# Navigation Menu
menu:
  首页: / || fas fa-home
  文章: /archives/ || fas fa-archive
  分类: /categories/ || fas fa-folder-open
  标签: /tags/ || fas fa-tags
  关于: /about/ || fas fa-heart

# Favicon
favicon: /img/favicon.png

# Avatar
avatar:
  img: /img/avatar.png
  effect: true

# Social links
social:
  github: https://github.com/ || fab fa-github
  weibo: https://weibo.com/ || fab fa-weibo

# Post meta display
post_meta:
  page:
    date_type: created
    categories: true
    tags: true
  post:
    date_type: created
    categories: true
    tags: true

# Code blocks
highlight_theme: mac

# Sidebar settings
aside:
  enable: true
  mobile: true
  position: right
  card_author:
    enable: true
    description: 贵州黔行
    button:
      enable: true
      icon: fab fa-github
      text: 关注
      link: https://github.com/
  card_announcement:
    enable: true
    content: 走遍大地神州，醉美多彩贵州
  card_categories:
    enable: true
    limit: 8
    expand: none
  card_tags:
    enable: true
    limit: 40
    color: true
  card_archives:
    enable: true
  card_webinfo:
    enable: true
    post_count: true
    last_push_date: true

# Footer
footer_bg: false

# Word count
wordcount:
  enable: true
  post_wordcount: true

# Local search
local_search:
  enable: true
  preload: true

# Copy settings
copyright:
  enable: true
  limit_count: 50

# Dark mode
darkmode:
  enable: true
  button: true
  autoChangeMode: false

# Beautify
beautify:
  enable: true
  field: post
  title-prefix-icon: '\f0c1'

# PWA (Progressive Web App)
pwa:
  enable: false

# Comments (disabled by default, enable when needed)
comments:
  use:
  text: true
  lazyload: true
  count: true

# Inject custom CSS/JS
inject:
  head:
    # 百度统计 (获取ID: https://tongji.baidu.com)
    # 替换 YOUR_BAIDU_ID 后取消注释
    # - '<script>var _hmt=_hmt||[];(function(){var hm=document.createElement("script");hm.src="https://hm.baidu.com/hm.js?YOUR_BAIDU_ID";var s=document.getElementsByTagName("script")[0];s.parentNode.insertBefore(hm,s)})();</script>'
    # JSON-LD 结构化数据（Google富文本搜索结果）
    - |
      <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "贵州黔行",
        "url": "https://guizhouren.netlify.app",
        "description": "走遍大地神州，醉美多彩贵州。贵州88县市旅游攻略、美食、景点全收录。",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://guizhouren.netlify.app/search/?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
      </script>
  bottom:

# CDN settings
cdn:
  enable: false

# Other
index_post_content:
  method: 2
  length: 200
